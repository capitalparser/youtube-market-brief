 쓰게 만드는 레이어로 재평가된다.", "- **좋게 풀리는 경우**: Dell AI 수주잔고와 Apple 온디바이스 AI 수요가 매출과 이익률로 확인된다.", "- **나쁘게 풀리는 경우**: Dell AI 서버는 이익률 낮은 조립·납품에 그치고, Apple의 기기 AI 전략은 클라우드 모델 경쟁에 밀린다."], "recentRows": ["- 2026-04-22: Dell/NVIDIA AI Factory 가설", "- 2026-05-05: Apple 온디바이스 AI 플랫폼"], "monitorRows": ["- Dell AI 수주잔고와 출하: 현장 배포 레이어 재평가 검증", "- Dell AI 서버 이익률: 이익 낮은 납품 사업인지 확인"], "riskRows": ["- Dell AI 수주잔고는 크지만 이익률과 현금 회수가 약하고 취소 위험이 높다.", "- NVIDIA/Dell 협력이 헤드라인에 그치고 공동 영업·표준 설계로 이어지지 않는다."], "evidenceRows": []}]}</script>
  <script>
    const data = JSON.parse(document.getElementById("payload").textContent);
    const state = { kind: "all", confidence: "all", query: "" };
    const cardsEl = document.getElementById("cards");
    const emptyEl = document.getElementById("empty");
    const updatedEl = document.getElementById("updated");
    updatedEl.textContent = data.updated;

    function setPressed(selector, attr, value) {
      document.querySelectorAll(selector).forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset[attr] === value));
      });
    }

    function metric(label, value) {
      return `<div class="metric"><strong>${value}</strong><span>${label}</span></div>`;
    }

    function renderSummary(filtered) {
      const themes = filtered.filter((card) => card.kind === "theme").length;
      const sectors = filtered.filter((card) => card.kind === "sector").length;
      const mid = filtered.filter((card) => card.confidence === "중간").length;
      const low = filtered.filter((card) => card.confidence === "낮음").length;
      document.getElementById("summary").innerHTML = [
        metric("visible", filtered.length),
        metric("themes", themes),
        metric("sectors", sectors),
        metric("중간 확신", mid),
        metric("낮은 확신", low),
      ].join("");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function list(title, rows) {
      if (!rows || rows.length === 0) return "";
      return `<div class="mini"><h3>${escapeHtml(title)}</h3><ul>${rows.map((row) => `<li>${escapeHtml(row.replace(/^- /, ""))}</li>`).join("")}</ul></div>`;
    }

    function cardHtml(card, index) {
      const open = index < 3 ? " open" : "";
      return `<article data-kind="${card.kind}" data-confidence="${escapeHtml(card.confidence)}"${open}>
        <details${open}>
          <summary>
            <div class="card-head">
              <div>
                <h2>${escapeHtml(card.label)}</h2>
                <div class="stance">${escapeHtml(card.stance)} · 확신도 ${escapeHtml(card.confidence)}</div>
              </div>
              <i class="chevron" aria-hidden="true"></i>
            </div>
          </summary>
          <div class="body">
            <div class="signal">
              <span class="label">최근 신호</span>
              <p>${escapeHtml(card.recent)}</p>
              <span class="label">다음 확인</span>
              <p>${escapeHtml(card.nextCheck)}</p>
            </div>
            <p>${escapeHtml(card.current)}</p>
            <div class="grid">
              ${list("핵심 가설", card.hypothesisRows)}
              ${list("최근 변화", card.recentRows)}
              ${list("확인 지표", card.monitorRows)}
              ${list("틀릴 조건", card.riskRows)}
              ${data.public ? "" : list("근거 메모", card.evidenceRows)}
            </div>
          </div>
        </details>
      </article>`;
    }

    function filteredCards() {
      const query = state.query.trim().toLowerCase();
      return data.cards.filter((card) => {
        if (state.kind !== "all" && card.kind !== state.kind) return false;
        if (state.confidence !== "all" && card.confidence !== state.confidence) return false;
        if (!query) return true;
        const haystack = [
          card.label,
          card.stance,
          card.confidence,
          card.recent,
          card.nextCheck,
          card.current,
          ...(card.hypothesisRows || []),
          ...(card.recentRows || []),
          ...(card.monitorRows || []),
          ...(card.riskRows || []),
          ...(card.evidenceRows || []),
        ].join(" ").toLowerCase();
        return haystack.includes(query);
      });
    }

    function render() {
      const filtered = filteredCards();
      renderSummary(filtered);
      cardsEl.innerHTML = filtered.map(cardHtml).join("");
      emptyEl.hidden = filtered.length > 0;
    }

    document.querySelectorAll("[data-kind]").forEach((button) => {
      button.addEventListener("click", () => {
        state.kind = button.dataset.kind;
        setPressed("[data-kind]", "kind", state.kind);
        render();
      });
    });
    document.querySelectorAll("[data-confidence]").forEach((button) => {
      button.addEventListener("click", () => {
        state.confidence = button.dataset.confidence;
        setPressed("[data-confidence]", "confidence", state.confidence);
        render();
      });
    });
    document.getElementById("search").addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });
    render();
  </script>
