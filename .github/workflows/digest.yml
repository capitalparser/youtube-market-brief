name: Daily Digest

# 매일 KST 07:00 / 12:00 / 18:00 / 23:00 실행. 수동 실행도 허용.
# state.json + daily_brief_sent로 idempotent — 신규 영상만 재처리.
on:
  schedule:
    - cron: "0 22 * * *"  # 07:00 KST
    - cron: "0 3 * * *"   # 12:00 KST
    - cron: "0 9 * * *"   # 18:00 KST
    - cron: "0 14 * * *"  # 23:00 KST
  workflow_dispatch:

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LLM_PROVIDER: api
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4.1
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      VAULT_ROOT_PATH: ${{ github.workspace }}/_cloud_vault
      DRY_RUN: "false"
      LOG_LEVEL: INFO
      TIMEZONE: Asia/Seoul
      RCLONE_DRIVE_FOLDER_ID: ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
      WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
      WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
      YOUTUBE_PROXY_URL: ${{ secrets.YOUTUBE_PROXY_URL }}
      TRANSCRIPT_BACKEND: ${{ vars.TRANSCRIPT_BACKEND || 'auto' }}
      YOUTUBE_COOKIE_FILE: /tmp/yt_cookies.txt
      ENABLE_STT_FALLBACK: ${{ vars.ENABLE_STT_FALLBACK || 'false' }}
      STT_MODEL: ${{ vars.STT_MODEL || 'gpt-4o-mini-transcribe' }}
      STT_AUDIO_MAX_MB: ${{ vars.STT_AUDIO_MAX_MB || '24' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12.7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure rclone (service account)
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.DRIVE_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
          cat > ~/.config/rclone/rclone.conf <<EOF
          [drive]
          type = drive
          scope = drive
          service_account_file = /tmp/sa.json
          root_folder_id = ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
          EOF

      - name: Pull existing state from Drive
        run: |
          mkdir -p "$VAULT_ROOT_PATH/Harness/sink/youtube_market_brief"
          rclone copy "drive:Harness/sink/youtube_market_brief/state.json" \
            "$VAULT_ROOT_PATH/Harness/sink/youtube_market_brief/" \
            --create-empty-src-dirs --quiet || echo "no prior state, starting fresh"

      - name: Pull config from Drive (watchlist.yaml only)
        run: |
          rclone copy "drive:config/watchlist.yaml" config/ --quiet || echo "no remote watchlist.yaml, skipping"

      - name: Write YouTube cookies (optional)
        env:
          YOUTUBE_COOKIES_RAW: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES_RAW" ]; then
            printf '%s' "$YOUTUBE_COOKIES_RAW" > /tmp/yt_cookies.txt
            echo "cookies written ($(wc -l < /tmp/yt_cookies.txt) lines, $(wc -c < /tmp/yt_cookies.txt) bytes)"
            FIRST_LINE=$(head -1 /tmp/yt_cookies.txt)
            echo "first_line_starts_with_hash=$(echo "$FIRST_LINE" | grep -c '^#' || echo 0)"
            echo "has_youtube_domain=$(grep -c '\.youtube\.com' /tmp/yt_cookies.txt || echo 0)"
          else
            touch /tmp/yt_cookies.txt
            echo "no YOUTUBE_COOKIES secret — running without cookies"
          fi

      - name: Health check
        run: uv run ymb health

      - name: Pull yesterday vault MDs from Drive (07:00 KST only)
        if: github.event.schedule == '0 22 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          TARGET=$(TZ=Asia/Seoul date -d "yesterday" +%Y-%m-%d)
          echo "Pulling vault MDs for $TARGET from Drive"
          mkdir -p "$VAULT_ROOT_PATH/00_Wiki/youtube"
          rclone copy "drive:00_Wiki/youtube/" "$VAULT_ROOT_PATH/00_Wiki/youtube/" \
            --include "${TARGET}__*.md" --quiet || echo "no prior MDs for $TARGET on Drive"
          rclone copy "drive:00_Wiki/youtube/" "$VAULT_ROOT_PATH/00_Wiki/youtube/" \
            --include "${TARGET}__*.analysis.json" --quiet || echo "no prior sidecars for $TARGET on Drive"

      - name: Run daily digest
        # 07:00 KST (cron "0 22 * * *") → catch up yesterday's videos AND
        #   regenerate yesterday's daily brief from all vault MDs (정리 발송)
        # 12/18/23 KST → process today's new videos only, skip brief
        # workflow_dispatch (manual) → process today's videos + brief (default)
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          if [ "$SCHEDULE" = "0 22 * * *" ]; then
            TARGET=$(TZ=Asia/Seoul date -d "yesterday" +%Y-%m-%d)
            echo "07:00 KST run — yesterday catch-up + brief: $TARGET"
            uv run ymb run --date "$TARGET" --no-brief
            uv run ymb aggregate-only --date "$TARGET"
          elif [ -n "$SCHEDULE" ]; then
            echo "intraday run ($SCHEDULE) — videos only, no brief"
            uv run ymb run --no-brief
          else
            echo "manual run — videos + brief (default)"
            uv run ymb run
          fi

      - name: Push outputs to Drive (MDs + state)
        if: always()
        run: |
          rclone copy "$VAULT_ROOT_PATH/00_Wiki/youtube/" "drive:00_Wiki/youtube/" --quiet || true
          if [ -d "$VAULT_ROOT_PATH/02_Areas/Market_Insights" ]; then
            rclone copy "$VAULT_ROOT_PATH/02_Areas/Market_Insights/" "drive:02_Areas/Market_Insights/" --quiet || true
          fi
          rclone copy "$VAULT_ROOT_PATH/Harness/sink/youtube_market_brief/state.json" \
            "drive:Harness/sink/youtube_market_brief/" --quiet || true
