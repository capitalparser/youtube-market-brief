name: Daily Digest

# 매일 KST 07:00 (UTC 22:00 전날) 실행. 수동 실행도 허용.
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LLM_PROVIDER: api
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4.1
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      VAULT_ROOT_PATH: ${{ github.workspace }}/_cloud_vault
      DRY_RUN: "false"
      LOG_LEVEL: INFO
      TIMEZONE: Asia/Seoul
      RCLONE_DRIVE_FOLDER_ID: ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
      WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
      WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
      TRANSCRIPT_BACKEND: ${{ vars.TRANSCRIPT_BACKEND || 'yt_dlp' }}
      YOUTUBE_COOKIE_FILE: /tmp/yt_cookies.txt

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12.7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure rclone (service account)
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.DRIVE_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
          cat > ~/.config/rclone/rclone.conf <<EOF
          [drive]
          type = drive
          scope = drive
          service_account_file = /tmp/sa.json
          root_folder_id = ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
          EOF

      - name: Pull existing state from Drive
        run: |
          mkdir -p "$VAULT_ROOT_PATH/Harness/sink/youtube_market_brief"
          rclone copy "drive:Harness/sink/youtube_market_brief/state.json" \
            "$VAULT_ROOT_PATH/Harness/sink/youtube_market_brief/" \
            --create-empty-src-dirs --quiet || echo "no prior state, starting fresh"

      - name: Pull config from Drive (watchlist.yaml only)
        run: |
          rclone copy "drive:config/watchlist.yaml" config/ --quiet || echo "no remote watchlist.yaml, skipping"

      - name: Write YouTube cookies (optional)
        env:
          YOUTUBE_COOKIES_RAW: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES_RAW" ]; then
            printf '%s' "$YOUTUBE_COOKIES_RAW" > /tmp/yt_cookies.txt
            echo "cookies written ($(wc -l < /tmp/yt_cookies.txt) lines, $(wc -c < /tmp/yt_cookies.txt) bytes)"
            FIRST_LINE=$(head -1 /tmp/yt_cookies.txt)
            echo "first_line_starts_with_hash=$(echo "$FIRST_LINE" | grep -c '^#' || echo 0)"
            echo "has_youtube_domain=$(grep -c '\.youtube\.com' /tmp/yt_cookies.txt || echo 0)"
          else
            touch /tmp/yt_cookies.txt
            echo "no YOUTUBE_COOKIES secret — running without cookies"
          fi

      - name: Health check
        run: uv run ymb health

      - name: Run daily digest
        run: uv run ymb run

      - name: Push outputs to Drive (MDs + state)
        if: always()
        run: |
          rclone copy "$VAULT_ROOT_PATH/00_Wiki/youtube/" "drive:00_Wiki/youtube/" --quiet || true
          rclone copy "$VAULT_ROOT_PATH/Harness/sink/youtube_market_brief/state.json" \
            "drive:Harness/sink/youtube_market_brief/" --quiet || true
